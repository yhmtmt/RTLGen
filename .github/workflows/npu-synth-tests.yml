name: NPU Synth Tests

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/npu-synth-tests.yml"
      - "npu/synth/**"
      - "tests/test_run_block_sweep_mode_compare.py"
  pull_request:
    paths:
      - ".github/workflows/npu-synth-tests.yml"
      - "npu/synth/**"
      - "tests/test_run_block_sweep_mode_compare.py"
  workflow_dispatch:

jobs:
  mode-compare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run mode_compare regression tests
        run: python tests/test_run_block_sweep_mode_compare.py
