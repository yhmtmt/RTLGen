version: 0.1
arch: npu/arch/examples/minimal.yml
mapper_notes:
  linear_layer_count: 2
  input_flattened: false
  input_cast_ignored: false
  effective_batch: 16
  gemm_num_modules: 1
  gemm_row_parallel_enabled: false
  gemm_row_chunks:
  - 16
  final_linear_row_parallel_enabled: false
  final_linear_row_chunks:
  - 16
  final_linear_out_chunks:
  - 256
  final_linear_split_enabled: false
  final_linear_weight_layout: packed_by_output_chunk
  terminal_softmax: false
  softmax_backend: none
  terminal_softmax_direct_output: false
  terminal_direct_output: false
  graph_output_name: Y
  ignored_graph_outputs: []
  gemm2_out_chunks:
  - 256
  gemm2_split_enabled: false
  gemm2_weight_layout: packed_by_output_chunk
buffers:
- id: X_DRAM
  addr: '0x3000000000'
  bytes: 4096
- id: Y_DRAM
  addr: '0x3000001000'
  bytes: 4096
- id: ACT_A_SRAM
  addr: '0x80000000'
  bytes: 8192
- id: ACT_B_SRAM
  addr: '0x80002000'
  bytes: 8192
- id: W1_DRAM
  addr: '0x3000002000'
  bytes: 131072
- id: b1_DRAM
  addr: '0x3000022000'
  bytes: 512
- id: W2_DRAM
  addr: '0x3000022200'
  bytes: 131072
- id: b2_DRAM
  addr: '0x3000042200'
  bytes: 256
- id: W_SRAM_TMP
  addr: '0x80400000'
  bytes: 131072
- id: b_SRAM_TMP
  addr: '0x80420000'
  bytes: 512
ops:
- id: dma_x
  type: dma_copy
  src: X_DRAM
  dst: ACT_A_SRAM
  bytes: 4096
- id: dma_w1
  type: dma_copy
  src: W1_DRAM
  dst: W_SRAM_TMP
  bytes: 131072
- id: dma_b1
  type: dma_copy
  src: b1_DRAM
  dst: b_SRAM_TMP
  bytes: 512
- id: gemm1
  type: gemm
  a: ACT_A_SRAM
  b: W_SRAM_TMP
  c: ACT_B_SRAM
  m: 16
  n: 512
  k: 256
  lda: 256
  ldb: 512
  ldc: 512
  dtype: int8
  layout: row_major
  bias: b_SRAM_TMP
  epilogue: relu
- id: dma_w2
  type: dma_copy
  src: W2_DRAM
  dst: W_SRAM_TMP
  bytes: 131072
- id: dma_b2
  type: dma_copy
  src: b2_DRAM
  dst: b_SRAM_TMP
  bytes: 256
- id: gemm2
  type: gemm
  a: ACT_B_SRAM
  b: W_SRAM_TMP
  c: ACT_A_SRAM
  m: 16
  n: 256
  k: 512
  lda: 512
  ldb: 256
  ldc: 256
  dtype: int8
  layout: row_major
  bias: b_SRAM_TMP
  epilogue: none
- id: dma_y
  type: dma_copy
  src: ACT_A_SRAM
  dst: Y_DRAM
  bytes: 4096
deps:
- wait:
  - dma_x
  - dma_w1
  - dma_b1
  then: gemm1
- wait:
  - gemm1
  - dma_w2
  - dma_b2
  then: gemm2
- wait:
  - gemm2
  then: dma_y
events:
- id: 1000
  signal_on: dma_y
  irq: true
