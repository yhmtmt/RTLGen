version: 0.1
arch: npu/arch/examples/minimal.yml
mapper_notes:
  gemm2_out_chunks:
  - 512
  gemm2_split_enabled: false
  gemm2_weight_layout: packed_by_output_chunk
buffers:
- id: X_DRAM
  addr: '0x3000000000'
  bytes: 16384
- id: W1_DRAM
  addr: '0x3000004000'
  bytes: 524288
- id: b1_DRAM
  addr: '0x3000084000'
  bytes: 1024
- id: W2_DRAM
  addr: '0x3000084400'
  bytes: 524288
- id: b2_DRAM
  addr: '0x3000104400'
  bytes: 512
- id: Y_DRAM
  addr: '0x3000104600'
  bytes: 16384
- id: X_SRAM
  addr: '0x80000000'
  bytes: 16384
- id: Y1_SRAM
  addr: '0x80004000'
  bytes: 32768
- id: Y2_SRAM_TMP
  addr: '0x80000000'
  bytes: 16384
- id: W1_SRAM
  addr: '0x80400000'
  bytes: 524288
- id: b1_SRAM
  addr: '0x80480000'
  bytes: 1024
- id: W2_SRAM_TMP
  addr: '0x80400000'
  bytes: 524288
- id: b2_SRAM_TMP
  addr: '0x80480000'
  bytes: 512
- id: W2_DRAM
  addr: '0x3000084400'
  bytes: 524288
- id: b2_DRAM
  addr: '0x3000104400'
  bytes: 512
- id: Y_DRAM
  addr: '0x3000104600'
  bytes: 16384
ops:
- id: dma_x
  type: dma_copy
  src: X_DRAM
  dst: X_SRAM
  bytes: 16384
- id: dma_w1
  type: dma_copy
  src: W1_DRAM
  dst: W1_SRAM
  bytes: 524288
- id: dma_b1
  type: dma_copy
  src: b1_DRAM
  dst: b1_SRAM
  bytes: 1024
- id: gemm1
  type: gemm
  a: X_SRAM
  b: W1_SRAM
  c: Y1_SRAM
  m: 32
  n: 1024
  k: 512
  lda: 512
  ldb: 1024
  ldc: 1024
  dtype: int8
  layout: row_major
  bias: b1_SRAM
  epilogue: relu
- id: dma_w2
  type: dma_copy
  src: W2_DRAM
  dst: W2_SRAM_TMP
  bytes: 524288
- id: dma_b2
  type: dma_copy
  src: b2_DRAM
  dst: b2_SRAM_TMP
  bytes: 512
- id: gemm2
  type: gemm
  a: Y1_SRAM
  b: W2_SRAM_TMP
  c: Y2_SRAM_TMP
  m: 32
  n: 512
  k: 1024
  lda: 1024
  ldb: 512
  ldc: 512
  dtype: int8
  layout: row_major
  bias: b2_SRAM_TMP
  epilogue: none
- id: dma_y
  type: dma_copy
  src: Y2_SRAM_TMP
  dst: Y_DRAM
  bytes: 16384
deps:
- wait:
  - dma_x
  - dma_w1
  - dma_b1
  then: gemm1
- wait:
  - gemm1
  - dma_w2
  - dma_b2
  then: gemm2
- wait:
  - gemm2
  then: dma_y
events:
- id: 1000
  signal_on: dma_y
  irq: true
