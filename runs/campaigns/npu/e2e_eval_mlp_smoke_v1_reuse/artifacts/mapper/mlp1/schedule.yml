version: 0.1
arch: npu/arch/examples/minimal.yml
buffers:
- id: X_DRAM
  addr: '0x3000000000'
  bytes: 512
- id: W1_DRAM
  addr: '0x3000000200'
  bytes: 8192
- id: b1_DRAM
  addr: '0x3000002200'
  bytes: 128
- id: W2_DRAM
  addr: '0x3000002280'
  bytes: 8192
- id: b2_DRAM
  addr: '0x3000004280'
  bytes: 64
- id: Y_DRAM
  addr: '0x30000042c0'
  bytes: 512
- id: X_SRAM
  addr: '0x80000000'
  bytes: 512
- id: Y1_SRAM
  addr: '0x80000200'
  bytes: 1024
- id: Y_SRAM
  addr: '0x80000600'
  bytes: 512
- id: W1_SRAM
  addr: '0x80400000'
  bytes: 8192
- id: b1_SRAM
  addr: '0x80402000'
  bytes: 128
- id: W2_SRAM
  addr: '0x80402080'
  bytes: 8192
- id: b2_SRAM
  addr: '0x80404080'
  bytes: 64
ops:
- id: dma_x
  type: dma_copy
  src: X_DRAM
  dst: X_SRAM
  bytes: 512
- id: dma_w1
  type: dma_copy
  src: W1_DRAM
  dst: W1_SRAM
  bytes: 8192
- id: dma_b1
  type: dma_copy
  src: b1_DRAM
  dst: b1_SRAM
  bytes: 128
- id: gemm1
  type: gemm
  a: X_SRAM
  b: W1_SRAM
  c: Y1_SRAM
  m: 8
  n: 128
  k: 64
  lda: 64
  ldb: 128
  ldc: 128
  dtype: int8
  layout: row_major
  bias: b1_SRAM
  epilogue: relu
- id: dma_w2
  type: dma_copy
  src: W2_DRAM
  dst: W2_SRAM
  bytes: 8192
- id: dma_b2
  type: dma_copy
  src: b2_DRAM
  dst: b2_SRAM
  bytes: 64
- id: gemm2
  type: gemm
  a: Y1_SRAM
  b: W2_SRAM
  c: Y_SRAM
  m: 8
  n: 64
  k: 128
  lda: 128
  ldb: 64
  ldc: 64
  dtype: int8
  layout: row_major
  bias: b2_SRAM
  epilogue: none
- id: dma_y
  type: dma_copy
  src: Y_SRAM
  dst: Y_DRAM
  bytes: 512
deps:
- wait:
  - dma_x
  - dma_w1
  - dma_b1
  then: gemm1
- wait:
  - gemm1
  - dma_w2
  - dma_b2
  then: gemm2
- wait:
  - gemm2
  then: dma_y
events:
- id: 1000
  signal_on: dma_y
  irq: true
