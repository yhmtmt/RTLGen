version: 0.1
arch: npu/arch/examples/minimal_terminal_direct_output.yml
mapper_notes:
  linear_layer_count: 1
  input_flattened: true
  input_cast_ignored: false
  effective_batch: 128
  gemm_num_modules: 1
  gemm_row_parallel_enabled: false
  gemm_row_chunks:
  - 128
  final_linear_row_parallel_enabled: false
  final_linear_row_chunks:
  - 128
  final_linear_out_chunks:
  - 64
  final_linear_split_enabled: false
  final_linear_weight_layout: packed_by_output_chunk
  terminal_softmax: false
  softmax_backend: none
  terminal_softmax_direct_output: false
  terminal_direct_output: true
  graph_output_name: Y
  ignored_graph_outputs: []
buffers:
- id: X_DRAM
  addr: '0x3000000000'
  bytes: 1024
- id: Y_DRAM
  addr: '0x3000000400'
  bytes: 8192
- id: ACT_A_SRAM
  addr: '0x80000000'
  bytes: 8192
- id: ACT_B_SRAM
  addr: '0x80002000'
  bytes: 8192
- id: W1_DRAM
  addr: '0x3000002400'
  bytes: 512
- id: b1_DRAM
  addr: '0x3000002600'
  bytes: 64
- id: W_SRAM_TMP
  addr: '0x80400000'
  bytes: 512
- id: b_SRAM_TMP
  addr: '0x80400200'
  bytes: 64
ops:
- id: dma_x
  type: dma_copy
  src: X_DRAM
  dst: ACT_A_SRAM
  bytes: 1024
- id: dma_w1
  type: dma_copy
  src: W1_DRAM
  dst: W_SRAM_TMP
  bytes: 512
- id: dma_b1
  type: dma_copy
  src: b1_DRAM
  dst: b_SRAM_TMP
  bytes: 64
- id: gemm1
  type: gemm
  a: ACT_A_SRAM
  b: W_SRAM_TMP
  c: Y_DRAM
  m: 128
  n: 64
  k: 8
  lda: 8
  ldb: 64
  ldc: 64
  dtype: int8
  layout: row_major
  bias: b_SRAM_TMP
  epilogue: none
deps:
- wait:
  - dma_x
  - dma_w1
  - dma_b1
  then: gemm1
events:
- id: 1000
  signal_on: gemm1
  irq: true
